<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vortex</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="stylesheet" href="/style.css?v=desktopchannel1" />
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <img src="/icon-192.png" class="brand-logo big" alt="Vortex" />
      <div class="auth-title">Vortex</div>
      <div class="auth-sub">phone + password</div>
      <input id="phoneInput" placeholder="Phone number" />
      <input id="passwordInput" type="password" placeholder="Password" />
      <button id="authBtn" class="primary-btn">Continue</button>
      <div class="auth-hint">Новый номер = регистрация, существующий = вход</div>
    </div>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="brand-wrap">
          <img src="/icon-192.png" class="brand-logo" alt="Vortex" />
          <div>
            <div class="brand-title">Vortex</div>
            <div class="brand-sub" id="mePhone">not logged</div>
          </div>
        </div>
        <button id="themeToggleBtn" class="ghost-btn">🌙</button>
      </div>

      <div class="search-row">
        <div class="search-box">
          <span class="search-ico">⌕</span>
          <input id="chatSearchInput" placeholder="Поиск чатов" />
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="chats">Чаты</button>
        <button class="tab-btn" data-tab="contacts">Контакты</button>
        <button class="tab-btn" data-tab="settings">Настройки</button>
      </div>

      <section id="panelChats" class="side-panel active">
        <div id="chatList" class="list"></div>
      </section>

      <section id="panelContacts" class="side-panel">
        <div class="contact-tools">
          <div class="search-box">
            <span class="search-ico">⌕</span>
            <input id="findPhoneInput" placeholder="Найти по номеру" />
          </div>
          <button id="findBtn" class="primary-btn compact">Найти</button>
          <div id="findResult" class="small-muted"></div>
        </div>
        <div id="contactsList" class="list"></div>
      </section>

      <section id="panelSettings" class="side-panel">
        <div class="settings-card">
          <div class="settings-title">Аккаунт</div>
          <div class="small-muted" id="settingsPhone">not logged</div>
        </div>
        <div class="settings-card">
          <div class="settings-title">Тема</div>
          <div class="small-muted">Светлая / тёмная</div>
        </div>
        <button id="logoutBtn" class="danger-btn">Выйти</button>
      </section>
    </aside>

    <main class="chat-shell">
      <header class="chat-head">
        <div class="chat-head-left">
          <div class="avatar" id="chatAvatar">V</div>
          <div>
            <div class="chat-name" id="chatHeaderName">Выбери чат</div>
            <div class="chat-sub" id="chatHeaderSub">Vortex Messenger</div>
          </div>
        </div>
      </header>

      <section id="messages" class="messages">
        <div class="empty-state">
          <img src="/icon-192.png" class="brand-logo empty" alt="Vortex" />
          <div class="empty-title">Vortex</div>
          <div class="small-muted">Открой контакт или выбери чат слева</div>
        </div>
      </section>

      <footer class="composer">
        <input id="messageInput" placeholder="Сообщение" />
        <button id="sendBtn" class="send-btn">➤</button>
        </footer>

  <section id="commentsPanel" class="comments-panel hidden">
    <header class="comments-head">
      <button id="closeCommentsBtn" class="ghost-btn">←</button>
      <div>
        <div class="chat-name">Комментарии</div>
        <div class="chat-sub" id="commentsSub">Обсуждение поста</div>
      </div>
    </header>
    <div class="comment-post-wrap">
      <div id="commentPostCard" class="comment-post-card"></div>
    </div>
    <section id="commentsList" class="messages comments-messages"></section>
    <footer class="composer">
      <input id="commentInput" placeholder="Написать комментарий" />
      <button id="commentSendBtn" class="send-btn">➤</button>
    </footer>
  </section>
</main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/ui.js?v=desktopchannel1"></script>
</body>
</html>
