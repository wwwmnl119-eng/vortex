<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vortex Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <div class="title">Vortex Admin</div>
        <div class="sub">admin / delover / moderator / beta roles</div>
      </div>
    </div>

    <div class="card">
      <input id="me" placeholder="your admin phone">
      <button onclick="loadUsers()">Load users</button>
    </div>

    <div class="card">
      <div style="font-weight:700;margin-bottom:8px;">Написать в канал Vortex Offical ✔️</div>
      <textarea id="channelText" placeholder="Текст поста" style="width:100%;min-height:90px;margin-bottom:10px;"></textarea>
      <button onclick="sendChannelPost()">Отправить в канал</button>
    </div>

    <div id="users" class="users"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
