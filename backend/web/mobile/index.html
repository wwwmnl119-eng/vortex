<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vortex Mobile</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Vortex" />
  <link rel="stylesheet" href="/mobile/style.css" />
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <img src="/icon-192.png" class="brand-logo big" alt="Vortex" />
      <div class="auth-title">Vortex</div>
      <div class="auth-subtitle">phone + password</div>
      <input id="phoneInput" placeholder="Phone number">
      <input id="passwordInput" type="password" placeholder="Password">
      <button id="authBtn">Continue</button>
      <div class="auth-hint">Новый номер = регистрация, существующий = вход</div>
    </div>
  </div>

  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <img src="/icon-192.png" class="brand-logo" alt="Vortex" />
        <div class="brand">Vortex</div>
      </div>
      <button class="icon-btn" id="themeToggleBtn">🌙</button>
    </header>

    <main class="screen">
      <section id="tabChats" class="tab-panel active">
        <div class="search-wrap">
          <div class="search-box">
            <span class="search-icon">⌕</span>
            <input id="chatSearchInput" placeholder="Поиск чатов" />
          </div>
        </div>
        <div id="chatList" class="chat-list"></div>
        <button class="fab" id="fabOpenContacts" title="Новый чат">✚</button>
      </section>

      <section id="tabContacts" class="tab-panel">
        <div class="section-pad">
          <div class="search-box">
            <span class="search-icon">⌕</span>
            <input id="findPhoneInput" placeholder="Найти по номеру" />
          </div>
          <button class="wide-btn" id="findBtn">Найти</button>
          <div id="findResult" class="info-text"></div>
        </div>
        <div id="contactsList" class="contact-list"></div>
      </section>

      <section id="tabSettings" class="tab-panel">
        <div class="card-list">
          <div class="card-item">
            <div class="card-title">Аккаунт</div>
            <div class="card-sub" id="settingsPhone">not logged</div><div class="card-sub" id="settingsRole">role: guest</div>
          </div>
          <div class="card-item">
            <div class="card-title">Тема</div>
            <div class="card-sub">Светлая / тёмная</div>
          </div>
          <button class="card-btn danger" id="logoutBtn">Выйти</button>
        </div>
      </section>

      <section id="tabProfile" class="tab-panel">
        <div class="profile-wrap">
          <div class="profile-avatar" id="profileAvatar">V</div>
          <div class="profile-name" id="profileName">Vortex user</div>
          <div class="profile-phone" id="profilePhone">not logged</div>
        </div>
      </section>
    </main>

    <div id="chatView" class="chat-view hidden">
      <header class="chat-header">
        <button class="icon-btn" id="backToChatsBtn">←</button>
        <div class="chat-header-meta">
          <div class="chat-header-name" id="chatHeaderName">Chat</div>
          <div class="chat-header-sub" id="chatHeaderSub">last seen recently</div>
        </div>
      </header>

      <section id="messages" class="messages"></section>

      <footer class="composer">
        <input id="messageInput" type="text" placeholder="Сообщение" />
        <button id="sendBtn">➤</button>
      </footer>
    </div>


<div id="commentsView" class="comments-view hidden">
  <header class="chat-header">
    <button class="icon-btn" id="backFromCommentsBtn">←</button>
    <div class="chat-header-meta">
      <div class="chat-header-name">Комментарии</div>
      <div class="chat-header-sub" id="commentsHeaderSub">Обсуждение поста</div>
    </div>
  </header>

  <section class="comment-post-wrap">
    <div id="commentPostCard" class="comment-post-card"></div>
  </section>

  <section id="commentsList" class="messages comments-list"></section>

  <footer class="composer">
    <input id="commentInput" type="text" placeholder="Написать комментарий" />
    <button id="commentSendBtn">➤</button>
  </footer>
</div>

    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="Chats">
        <span class="nav-icon">💬</span>
        <span class="nav-label">Чаты</span>
      </button>
      <button class="nav-item" data-tab="Contacts">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Контакты</span>
      </button>
      <button class="nav-item" data-tab="Settings">
        <span class="nav-icon">⚙</span>
        <span class="nav-label">Настройки</span>
      </button>
      <button class="nav-item" data-tab="Profile">
        <span class="nav-icon">🖼</span>
        <span class="nav-label">Профиль</span>
      </button>
    </nav>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/mobile/app.js"></script>
</body>
</html>
