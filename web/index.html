<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vortex Render Ready</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="logo">Vortex</div>
      <div class="subtitle">войти в аккаунт</div>
      <input id="phone" placeholder="phone number">
      <input id="username" placeholder="username">
      <label class="agree-row">
        <input type="checkbox" id="agree">
        <span>agree to terms</span>
      </label>
      <button class="primary-btn" onclick="register()">continue</button>
    </div>
  </div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-title">Vortex</div>
        <button class="ghost-btn mini" onclick="logout()">logout</button>
      </div>

      <div class="me-card">
        <div class="avatar big" id="meAvatar">U</div>
        <div>
          <div class="me-name" id="meName">User</div>
          <div class="me-phone" id="mePhone">-</div>
        </div>
      </div>

      <div class="search-box">
        <input id="searchInput" placeholder="search chats">
      </div>

      <div class="add-box">
        <input id="addPhone" placeholder="friend phone">
        <button class="primary-btn small" onclick="addContact()">add contact</button>
      </div>

      <div class="chat-list" id="chatList"></div>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <div class="chat-head-left">
          <div class="avatar" id="friendAvatar">?</div>
          <div>
            <div class="friend-name" id="friendName">no chat selected</div>
            <div class="friend-status" id="friendStatus">choose a contact on the left</div>
          </div>
        </div>
      </header>

      <section class="messages" id="messages"></section>

      <footer class="composer">
        <input id="msg" placeholder="write message...">
        <button class="send-btn" onclick="send()">➤</button>
      </footer>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="ui.js"></script>
</body>
</html>
